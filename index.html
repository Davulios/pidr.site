<!DOCTYPE html>
<html lang="ru">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S9EL443J08"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-S9EL443J08');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анекдот-Кость | Озвучка 🔊</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        
        .top-buttons { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        
        .btn { padding: 10px 15px; background: white; border: 2px solid #333; border-radius: 10px; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 0 #333; transition: 0.1s; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #333; }
        
        #joke-display { font-size: 1.5rem; text-align: center; max-width: 80%; margin: 40px 0; min-height: 120px; color: #333; line-height: 1.4; display: flex; align-items: center; justify-content: center; }
        
        .dice-button { width: 100px; height: 100px; background-color: white; border: 4px solid #333; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; box-shadow: 0 6px 0 #333; transition: all 0.1s; user-select: none; margin-bottom: 50px; }
        .dice-button:active { transform: translateY(4px) rotate(10deg); box-shadow: 0 2px 0 #333; }
        
        footer { margin-top: auto; padding: 20px; font-size: 0.8rem; color: #777; text-align: center; }
    </style>
</head>
<body>

    <div class="top-buttons">
        <button class="btn" onclick="speakJoke()">🔊 Послушать</button>
        <button class="btn" onclick="shareJoke()">🔗 Поделиться</button>
    </div>

    <div id="joke-display">Нажми на кубик и послушай анекдот! 🎲</div>

    <div class="dice-button" onclick="getRandomJoke()">🎲</div>

    <footer>
        <p>&copy; 2026 pidr.site — Теперь мы еще и говорим!</p>
    </footer>

    <script>
        const jokes = [
            "Когда я была молодая, мне повстречалась добрая волшебница, которая предложила мне на выбор хорошую память на всю жизнь или богатого мужа. Я уже даже и не помню, что я тогда выбрала…",
            "– У вас есть рекомендации с прежнего места работы?\n– Да, мне там порекомендовали поискать другую работу…",
            "Золотая рыбка:\n– Что тебе, ящик водки или вечную жизнь?\n– Ящик водки! Все равно через семь миллиардов лет солнце погаснет!",
            "Русалка села на шпагат.",
            "Колобок повесился.",
            "Старшина обходит строй новобранцев.\n- Так, у тебя какое образование?\n- Семь классов!\n- Хорошо, а у тебя?\n- МГУ!\n- Чего мычишь, читать-то умеешь?",
            "На сок!! Какой носок? На сок! Я не вижу никаких носков! Сок возьми, дура!",
            "Клиент — официанту:\n- А это правда, что вы за нами доедаете?\n- Нет, что вы... Это вы за нами доедаете.",
            "Как-то застал соседа по коммуналке за кражей на кухне. Он долго меня стыдил, что подглядывать нехорошо.",
            "Британские учёные установили, что шоколад поднимает настроение... Они, наверное, ещё водку не пробовали.",
            "Упал ежик в глубокую пустую яму, прыгал час, прыгал два, потом устал и говорит: блин, если через пять минут не вылезу — за лестницей пойду!",
            "Идет медведь по лесу, видит — машина горит. Сел в неё и сгорел."
        ];

        let currentJoke = "";

        function getRandomJoke() {
            const display = document.getElementById('joke-display');
            // Останавливаем озвучку, если она шла, при смене анекдота
            window.speechSynthesis.cancel();
            
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * jokes.length);
            } while (jokes[randomIndex] === currentJoke && jokes.length > 1);
            
            currentJoke = jokes[randomIndex];
            display.innerText = currentJoke;
        }

        // ФУНКЦИЯ ОЗВУЧКИ
        // Улучшенная функция озвучки
        function speakJoke() {
            if (!currentJoke || currentJoke.includes("Нажми на кубик")) {
                alert("Сначала выбей анекдот!");
                return;
            }

            window.speechSynthesis.cancel(); // Стоп, если уже говорит

            const utterance = new SpeechSynthesisUtterance(currentJoke);
            
            // Пытаемся найти более живой голос (например, Google или Premium)
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.lang.includes('ru') && v.name.includes('Google')) 
                                  || voices.find(v => v.lang.includes('ru'));
            
            if (preferredVoice) utterance.voice = preferredVoice;

            utterance.lang = 'ru-RU';
            utterance.pitch = 1.1; // Чуть выше тон, чтобы не было депрессивного баса
            utterance.rate = 1.0;  // Нормальная скорость
            
            window.speechSynthesis.speak(utterance);
        }

        async function shareJoke() {
            if (!currentJoke) return;
            if (navigator.share) {
                try { await navigator.share({ title: 'Ору! 😂', text: currentJoke, url: window.location.href }); } catch (err) {}
            } else {
                navigator.clipboard.writeText(currentJoke);
                alert("Анекдот скопирован!");
            }
        }
    </script>
</body>
</html>
