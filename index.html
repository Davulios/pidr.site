    <style>

         /* Стиль плашки-предупреждения */
#browser-warning {
    display: none; /* Скрыто по умолчанию */
    width: 90%;

<body>

    <div id="browser-warning">
    ⚠️ Бро, мессенджеры блокируют звук! <br>
    Нажми "три точки" и выбери <b>"Открыть в браузере"</b> для озвучки.
</div>

    <div id="joke-display">Нажми на кубик, чтобы услышать анекдот! 🎲</div>

    <div class="dice-button" onclick="getRandomJoke()">🎲</div>

    <div class="controls-container">
        <button class="btn" onclick="shareJoke()">🔗 Поделиться</button>
    </div>

    <footer>
        <p>&copy; 2026 pidr.site — Юмор без границ</p>
    </footer>

    <script>
        // Инициализация синтезатора
        const synth = window.speechSynthesis;
        let currentJoke = "";

        // Функция принудительной активации звука для мобильных браузеров
        function initAudioContext() {
            const utterance = new SpeechSynthesisUtterance("");
            synth.speak(utterance);
            synth.cancel();
        }

        const jokes = [
            "Не спрашивай у мужчины про его доходы, у женщины про возраст, у патриота, откуда у него американский паспорт.",
            "Робин Гуд впадал в ступор, встречая людей среднего достатка.",
            "Опишите себя в трех словах. Ленивый.",
            "— Знаешь, а муж у тебя гуляет. — Пусть гуляет. Он тепло одет.",
            "Работница паспортного стола может есть лимон, и при этом ее мимика никак не меняется.",
            "Патологоанатом умер, но все равно поехал на работу.",
            "Глухой вор вскрыл гараж и обнаружил внутри рок-группу.",
            "Все еще жду, когда мне в жизни пригодятся дециметры.",
            "— Подсудимый, что вас побудило ограбить банк? — Он первый начал!",
            "— А в какой концлагерь нас везут? — Не знаю, не интересуюсь политикой.",
            "Когда я была молодая, мне повстречалась добрая волшебница, которая предложила мне на выбор хорошую память на всю жизнь или богатого мужа. Я уже даже и не помню, что я тогда выбрала…",
            "– У вас есть рекомендации с прежнего места работы?\n– Да, мне там порекомендовали поискать другую работу…",
            "Золотая рыбка:\n– Что тебе, ящик водки или вечную жизнь?\n– Ящик водки! Все равно через семь миллиардов лет солнце погаснет!",
            "Русалка села на шпагат.",
            "Колобок повесился.",
            "Старшина обходит строй новобранцев.\n- Так, у тебя какое образование?\n- Семь классов!\n- Хорошо, а у тебя?\n- МГУ!\n- Чего мычишь, читать-то умеешь?",
            "На сок!! Какой носок? На сок! Я не вижу никаких носков! Сок возьми, дура!",
            "Клиент — официанту:\n- А это правда, что вы за нами доедаете?\n- Нет, что вы... Это вы за нами доедаете.",
            "Как-то застал соседа по коммуналке за кражей на кухне. Он долго меня стыдил, что подглядывать нехорошо.",
            "Британские учёные установили, что шоколад поднимает настроение... Они, наверное, ещё водку не пробовали.",
            "Упал ежик в глубокую пустую яму, прыгал час, прыгал два, потом устал и говорит: блин, если через пять минут не вылезу — за лестницей пойду!",
        ];

        function getRandomJoke() {
            // Активируем аудио при первом же клике
            initAudioContext();
            
            const display = document.getElementById('joke-display');
            
            // Останавливаем старую озвучку
            synth.cancel();

            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * jokes.length);
            } while (jokes[randomIndex] === currentJoke && jokes.length > 1);

            currentJoke = jokes[randomIndex];
            display.innerText = currentJoke;

            // Запускаем озвучку с микро-задержкой для стабильности в WebView
            setTimeout(() => {
                speakJoke(currentJoke);
            }, 50);
        }

        function speakJoke(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();
            
            // Пытаемся найти качественный русский голос
            const preferredVoice = voices.find(v => v.lang.includes('ru') && v.name.includes('Google')) 
                                || voices.find(v => v.lang.includes('ru'));
            
            if (preferredVoice) utterance.voice = preferredVoice;
            
            utterance.lang = 'ru-RU';
            utterance.pitch = 1.0; 
            utterance.rate = 1.0;  
            
            synth.speak(utterance);
        }

        async function shareJoke() {
            if (!currentJoke || currentJoke.includes("Нажми на кубик")) {
                alert("Сначала выбей анекдот!");
                return;
            }
            if (navigator.share) {
                try { 
                    await navigator.share({ 
                        title: 'Ору! 😂', 
                        text: currentJoke, 
                        url: window.location.href 
                    }); 
                } catch (err) {}
            } else {
                navigator.clipboard.writeText(currentJoke);
                alert("Анекдот скопирован!");
            }
        }

        // Прогружаем голоса заранее (важно для Chrome/Android)
        if (synth.onvoiceschanged !== undefined) {
            synth.onvoiceschanged = () => synth.getVoices();
        }
        function checkAndShowWarning() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    // Проверяем на популярные встроенные браузеры
    const isWebView = /Telegram|Instagram|FBAN|FBAV|VKMobile|Line|WhatsApp/i.test(ua);
    
    if (isWebView) {
        const warning = document.getElementById('browser-warning');
        if (warning) warning.style.display = 'block';
    }
}
        function testSpeech() {
    return new Promise((resolve) => {
        const utterance = new SpeechSynthesisUtterance("test");
        
        utterance.onstart = () => resolve(true);
        utterance.onerror = () => resolve(false);

        speechSynthesis.speak(utterance);

        setTimeout(() => resolve(false), 500);
    });
        }

// Запускаем проверку сразу при загрузке страницы
checkAndShowWarning();
    </script>
</body>
