<!DOCTYPE html>
<html lang="ru">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S9EL443J08"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-S9EL443J08');
    </script>

    <meta name="monetag" content="540052224308eb27fa05cf2d3c102473">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анекдот-Кость | pidr.site</title>
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            padding-top: 15vh; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #f0f2f5; 
            font-family: 'Segoe UI', sans-serif; 
            box-sizing: border-box;
        }

        /* Стиль плашки-предупреждения */
        #browser-warning {
            display: none;
            width: 90%;
            background: #ff4757;
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        #joke-display { 
            font-size: 1.5rem; 
            text-align: center; 
            max-width: 85%; 
            margin-bottom: 30px; 
            min-height: 160px; 
            color: #333; 
            line-height: 1.4; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .dice-button { 
            width: 100px; 
            height: 100px; 
            background-color: white; 
            border: 4px solid #333; 
            border-radius: 20px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 3.5rem; 
            box-shadow: 0 6px 0 #333; 
            transition: all 0.1s; 
            user-select: none; 
            margin-bottom: 40px; 
        }
        
        .dice-button:active { 
            transform: translateY(4px) rotate(10deg); 
            box-shadow: 0 2px 0 #333; 
        }

        .controls-container { 
            margin-bottom: 50px;
        }
        
        .btn { 
            padding: 15px 30px; 
            background: white; 
            border: 2px solid #333; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1.1rem; 
            font-weight: bold;
            box-shadow: 0 4px 0 #333; 
            transition: 0.1s; 
        }

        footer { 
            margin-top: auto; 
            padding: 20px; 
            font-size: 0.8rem; 
            color: #ccc; 
            text-align: center; 
        }
    </style>
</head>
<body>

    <div id="browser-warning">
        ⚠️ Бро, мессенджеры блокируют звук! <br>
        Нажми "три точки" и выбери <b>"Открыть в браузере"</b> для озвучки.
    </div>

    <div id="joke-display">Нажми на кубик, чтобы услышать анекдот! 🎲</div>

    <div class="dice-button" onclick="getRandomJoke()">🎲</div>

    <div class="controls-container">
        <button class="btn" onclick="shareJoke()">🔗 Поделиться</button>
    </div>

    <footer>
        <p>&copy; 2026 pidr.site — Юмор без границ</p>
    </footer>

    <script>
        const synth = window.speechSynthesis;
        let currentJoke = "";

        // Детектор встроенных браузеров
        function checkBrowser() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isWebView = (ua.includes('Instagram') || ua.includes('FBAN') || ua.includes('FBAV') || ua.includes('Telegram') || ua.includes('VKMobile'));
            
            if (isWebView) {
                document.getElementById('browser-warning').style.display = 'block';
            }
        }

        // Запускаем проверку при загрузке
        checkBrowser();

        function initAudio() {
            const utterance = new SpeechSynthesisUtterance("");
            synth.speak(utterance);
            synth.cancel();
        }

        const jokes = [
            "Не спрашивай у мужчины про его доходы, у женщины про возраст, у патриота, откуда у него американский паспорт.",
            "Робин Гуд впадал в ступор, встречая людей среднего достатка.",
            "Опишите себя в трех словах. Ленивый.",
            "— Знаешь, а муж у тебя гуляет. — Пусть гуляет. Он тепло одет.",
            "Работница паспортного стола может есть лимон, и при этом ее мимика никак не меняется.",
            "Патологоанатом умер, но все равно поехал на работу.",
            "Глухой вор вскрыл гараж и обнаружил внутри рок-группу.",
            "Все еще жду, когда мне в жизни пригодятся дециметры.",
            "— Подсудимый, что вас побудило ограбить банк? — Он первый начал!",
            "— А в какой концлагерь нас везут? — Не знаю, не интересуюсь политикой.",
            "Когда я была молодая, мне повстречалась добрая волшебница, которая предложила мне на выбор хорошую память на всю жизнь или богатого мужа. Я уже даже и не помню, что я тогда выбрала…",
            "– У вас есть рекомендации с прежнего места работы?\n– Да, мне там порекомендовали поискать другую работу…",
            "Золотая рыбка:\n– Что тебе, ящик водки или вечную жизнь?\n– Ящик водки! Все равно через семь миллиардов лет солнце погаснет!",
            "Русалка села на шпагат.",
            "Колобок повесился.",
            "Старшина обходит строй новобранцев.\n- Так, у тебя какое образование?\n- Семь классов!\n- Хорошо, а у тебя?\n- МГУ!\n- Чего мычишь, читать-то умеешь?",
            "На сок!! Какой носок? На сок! Я не вижу никаких носков! Сок возьми, дура!",
            "Клиент — официанту:\n- А это правда, что вы за нами доедаете?\n- Нет, что вы... Это вы за нами доедаете.",
            "Как-то застал соседа по коммуналке за кражей на кухне. Он долго меня стыдил, что подглядывать нехорошо.",
            "Британские учёные установили, что шоколад поднимает настроение... Они, наверное, ещё водку не пробовали.",
            "Упал ежик в глубокую пустую яму, прыгал час, прыгал два, потом устал и говорит: блин, если через пять минут не вылезу — за лестницей пойду!",
        ];

        function getRandomJoke() {
            initAudio();
            const display = document.getElementById('joke-display');
            synth.cancel();

            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * jokes.length);
            } while (jokes[randomIndex] === currentJoke && jokes.length > 1);

            currentJoke = jokes[randomIndex];
            display.innerText = currentJoke;

            setTimeout(() => {
                speakJoke(currentJoke);
            }, 100);
        }

        function speakJoke(text) {
            if (!synth) return;
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();
            const preferredVoice = voices.find(v => v.lang.includes('ru') && (v.name.includes('Google') || v.name.includes('Premium'))) 
                                || voices.find(v => v.lang.includes('ru'));
            
            if (preferredVoice) utterance.voice = preferredVoice;
            utterance.lang = 'ru-RU';
            utterance.rate = 1.0;  
            synth.speak(utterance);
        }

        async function shareJoke() {
            if (!currentJoke || currentJoke.includes("Нажми на кубик")) {
                alert("Сначала выбей анекдот!");
                return;
            }
            if (navigator.share) {
                try { await navigator.share({ title: 'Ору! 😂', text: currentJoke, url: window.location.href }); } catch (err) {}
            } else {
                navigator.clipboard.writeText(currentJoke);
                alert("Анекдот скопирован!");
            }
        }

        window.speechSynthesis.onvoiceschanged = () => synth.getVoices();
    </script>
</body>
</html>
