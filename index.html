    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анекдот-Кость | pidr.site</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            padding-top: 15vh; min-height: 100vh; margin: 0; background-color: #f0f2f5; 
            font-family: 'Segoe UI', sans-serif; box-sizing: border-box;
        }
        .joke-container { display: flex; flex-direction: column; align-items: center; width: 90%; max-width: 600px; }
        #joke-display { 
            font-size: 1.5rem; text-align: center; margin-bottom: 10px; min-height: 160px; 
            color: #333; line-height: 1.4; display: flex; align-items: center; justify-content: center; 
        }
        .sound-toggle {
            font-size: 1.8rem; cursor: pointer; margin-bottom: 20px; padding: 10px;
            border-radius: 50%; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            user-select: none; transition: 0.2s;
        }
        .sound-toggle.enabled { color: #2ecc71; border: 2px solid #2ecc71; }
        .sound-toggle.disabled { color: #95a5a6; border: 2px solid #95a5a6; opacity: 0.6; }
        
        .dice-button { 
            width: 100px; height: 100px; background-color: white; border: 4px solid #333; 
            border-radius: 20px; cursor: pointer; display: flex; align-items: center; 
            justify-content: center; font-size: 3.5rem; box-shadow: 0 6px 0 #333; transition: 0.1s; 
        }
        .dice-button:active { transform: translateY(4px); box-shadow: 0 2px 0 #333; }
        
        .btn { 
            padding: 15px 30px; background: white; border: 2px solid #333; border-radius: 12px; 
            cursor: pointer; font-size: 1.1rem; font-weight: bold; box-shadow: 0 4px 0 #333; margin-top: 30px;
        }
        footer { margin-top: auto; padding: 20px; font-size: 0.8rem; color: #ccc; }
    </style>
</head>
<body>

    <audio id="joke-player"></audio>

    <div class="joke-container">
        <div id="joke-display">Нажми на кубик! 🎲</div>
        <div id="sound-btn" class="sound-toggle enabled" onclick="toggleSound()">🔊</div>
    </div>

    <div class="dice-button" onclick="getRandomJoke()">🎲</div>

    <button class="btn" onclick="shareJoke()">🔗 Поделиться</button>

    <footer><p>&copy; 2026 pidr.site</p></footer>

    <script>
        const player = document.getElementById('joke-player');
        let currentJokeIndex = -1;
        let isSoundEnabled = true; // ПО УМОЛЧАНИЮ: ВКЛ

        const jokes = [
            "— Как узнать, что блондинка говорит глупость? — У нее начинают губы шевелится.", // 0.MP3
            "Блондинка пишет жалобу на врача УЗИ: «Во время обследования врач смотрел телевизор».", // 1.MP3
            "— Откройте клетку, а то у лошади загар неравномерный! — возмутилась блондинка, глядя на зебру.", // 2.MP3
            "Жена мужу: — Саша, ну почему ты всё время злишься? — Да потому, что я Виталик!", // 3.MP3
            "— Папочка! Можно я тебя поцелую?! — Денег нет! Меня уже мама поцеловала.", // 4.MP3
            "Если с первого раза у вас ничего не получилось — парашютный спорт не для вас!..", // 5.MP3
            "Единственная женщина которую слушает мужик, это та баба, что сидит в навигаторе.", // 6.MP3
            "— Я с самой свадьбы еще не разговаривал с женой. — Поссорились? — Не хочу ее перебивать.", // 7.MP3
            "Интересно, почему во всех детских поликлиниках висят плакаты с Айболитом? Он же ветеринар!", // 8.MP3
            "Не спрашивай у мужчины про его доходы, у женщины про возраст, у патриота, откуда у него американский паспорт.", // 9.MP3
            "Робин Гуд впадал в ступор, встречая людей среднего достатка.", // 10.MP3
            "Опишите себя в трех словах. Ленивый.", // 11.MP3
            "— Знаешь, а муж у тебя гуляет. — Пусть гуляет. Он тепло одет.", // 12.MP3
            "Работница паспортного стола может есть лимон, и при этом ее мимика никак не меняется.", // 13.MP3
            "Патологоанатом умер, но все равно поехал на работу.", // 14.MP3
            "Глухой вор вскрыл гараж и обнаружил внутри рок-группу.", // 15.MP3
            "Все еще жду, когда мне в жизни пригодятся дециметры.", // 16.MP3
            "— Подсудимый, что вас побудило ограбить банк? — Он первый начал!", // 17.MP3
            "Два яйца болтают в холодильнике. Но почему ты зеленый и волосатый? Я киви, придурок.", // 18.MP3
            "Колобок повесился.", // 19.MP3
            "Британские учёные установили, что шоколад поднимает настроение... Они, наверное, ещё водку не пробовали.", // 20.MP3
            "Упал ежик в глубокую пустую яму, прыгал час, прыгал два, потом устал и говорит: блин, если через пять минут не вылезу — за лестницей пойду!", // 21.MP3
            "Отец-охотник убил медведя. Мясо он оставил себе, шкуру подарил жене, а цирковой велосипед достался сыну." // 22.MP3
        ];

        function toggleSound() {
            isSoundEnabled = !isSoundEnabled;
            const btn = document.getElementById('sound-btn');
            btn.innerText = isSoundEnabled ? "🔊" : "🔇";
            btn.className = `sound-toggle ${isSoundEnabled ? 'enabled' : 'disabled'}`;
            
            if (!isSoundEnabled) {
                player.pause();
            } else {
                // Легкий фикс для активации аудио при включении
                player.play().catch(() => {});
            }
        }

        function getRandomJoke() {
            player.pause();
            player.currentTime = 0;

            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * jokes.length);
            } while (randomIndex === currentJokeIndex);

            currentJokeIndex = randomIndex;
            document.getElementById('joke-display').innerText = jokes[currentJokeIndex];

            if (isSoundEnabled) {
                // Путь с расширением .MP3 (как у тебя в папке на GitHub)
                player.src = `audio/${currentJokeIndex}.MP3`;
                
                // Небольшой таймаут гарантирует, что браузер подцепит src
                setTimeout(() => {
                    player.play().catch(e => console.log("Браузер заблокировал автоплей. Нужно нажатие пользователя."));
                }, 50);
            }
        }

        async function shareJoke() {
            if (currentJokeIndex === -1) return alert("Сначала выбей анекдот!");
            const text = jokes[currentJokeIndex];
            if (navigator.share) {
                await navigator.share({ title: 'Ору! 😂', text: text, url: window.location.href });
            } else {
                navigator.clipboard.writeText(text);
                alert("Скопировано!");
            }
        }
    </script>
</body>
</html>
