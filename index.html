<!DOCTYPE html>
<html lang="ru">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S9EL443J08"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-S9EL443J08');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анекдот-Кость | Авто-озвучка 🔊</title>
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #f0f2f5; 
            font-family: 'Segoe UI', sans-serif; 
        }
        
        #joke-display { 
            font-size: 1.5rem; 
            text-align: center; 
            max-width: 80%; 
            margin-bottom: 40px; 
            min-height: 120px; 
            color: #333; 
            line-height: 1.4; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .dice-button { 
            width: 100px; 
            height: 100px; 
            background-color: white; 
            border: 4px solid #333; 
            border-radius: 15px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 3.5rem; 
            box-shadow: 0 6px 0 #333; 
            transition: all 0.1s; 
            user-select: none; 
            margin-bottom: 30px; 
        }
        
        .dice-button:active { 
            transform: translateY(4px) rotate(10deg); 
            box-shadow: 0 2px 0 #333; 
        }

        .controls-container { 
            margin-bottom: 50px;
        }
        
        .btn { 
            padding: 12px 25px; 
            background: white; 
            border: 2px solid #333; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: bold;
            box-shadow: 0 4px 0 #333; 
            transition: 0.1s; 
        }
        
        .btn:active { 
            transform: translateY(2px); 
            box-shadow: 0 2px 0 #333; 
        }
        
        footer { 
            margin-top: auto; 
            padding: 20px; 
            font-size: 0.8rem; 
            color: #777; 
            text-align: center; 
        }
    </style>
</head>
<body>

    <div id="joke-display">Нажми на кубик, чтобы услышать анекдот! 🎲</div>

    <div class="dice-button" onclick="getRandomJoke()">🎲</div>

    <div class="controls-container">
        <button class="btn" onclick="shareJoke()">🔗 Поделиться</button>
    </div>

    <footer>
        <p>&copy; 2026 pidr.site — Смех продлевает жизнь</p>
    </footer>

    <script>
        // Прогрев голосов
        window.speechSynthesis.getVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
        }

        const jokes = [
            "Когда я была молодая, мне повстречалась добрая волшебница, которая предложила мне на выбор хорошую память на всю жизнь или богатого мужа. Я уже даже и не помню, что я тогда выбрала…",
            "– У вас есть рекомендации с прежнего места работы?\n– Да, мне там порекомендовали поискать другую работу…",
            "Золотая рыбка:\n– Что тебе, ящик водки или вечную жизнь?\n– Ящик водки! Все равно через семь миллиардов лет солнце погаснет!",
            "Русалка села на шпагат.",
            "Колобок повесился.",
            "Старшина обходит строй новобранцев.\n- Так, у тебя какое образование?\n- Семь классов!\n- Хорошо, а у тебя?\n- МГУ!\n- Чего мычишь, читать-то умеешь?",
            "На сок!! Какой носок? На сок! Я не вижу никаких носков! Сок возьми, дура!",
            "Клиент — официанту:\n- А это правда, что вы за нами доедаете?\n- Нет, что вы... Это вы за нами доедаете.",
            "Как-то застал соседа по коммуналке за кражей на кухне. Он долго меня стыдил, что подглядывать нехорошо.",
            "Британские учёные установили, что шоколад поднимает настроение... Они, наверное, ещё водку не пробовали.",
            "Упал ежик в глубокую пустую яму, прыгал час, прыгал два, потом устал и говорит: блин, если через пять минут не вылезу — за лестницей пойду!",
            "Идет медведь по лесу, видит — машина горит. Сел в неё и сгорел."
        ];

        let currentJoke = "";

        function getRandomJoke() {
            const display = document.getElementById('joke-display');
            
            // 1. Останавливаем старую озвучку
            window.speechSynthesis.cancel();
            
            // 2. Выбираем новый анекдот
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * jokes.length);
            } while (jokes[randomIndex] === currentJoke && jokes.length > 1);
            
            currentJoke = jokes[randomIndex];
            display.innerText = currentJoke;

            // 3. Автоматически озвучиваем
            speakJoke(currentJoke);
        }

        function speakJoke(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.lang.includes('ru') && v.name.includes('Google')) 
                                  || voices.find(v => v.lang.includes('ru'));
            
            if (preferredVoice) utterance.voice = preferredVoice;

            utterance.lang = 'ru-RU';
            utterance.pitch = 1.1; 
            utterance.rate = 1.0;  
            
            window.speechSynthesis.speak(utterance);
        }

        async function shareJoke() {
            if (!currentJoke || currentJoke.includes("Нажми на кубик")) {
                alert("Сначала выбей анекдот!");
                return;
            }
            if (navigator.share) {
                try { await navigator.share({ title: 'Ору! 😂', text: currentJoke, url: window.location.href }); } catch (err) {}
            } else {
                navigator.clipboard.writeText(currentJoke);
                alert("Анекдот скопирован!");
            }
        }
    </script>
</body>
</html>
